<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scott Landau Team | Luxury Real Estate · Greater Philadelphia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&amp;family=Jost:wght@200;300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #111828;
      --navy:   #364A74;
      --gold:   #b8965a;
      --gold2:  #d4af72;
      --gold3:  #f0d9a8;
      --cream:  #f7f3ec;
      --warm:   #faf8f4;
      --mist:   #e8e2d9;
      --slate:  #8a8a8a;
      --white:  #ffffff;
      --exp-navy: #364A74;
      --exp-dark: #111828;
    }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--ink);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       CURSOR GLOW
    ══════════════════════════════════════ */
    .cursor-glow {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184,150,90,0.07) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: opacity 0.3s;
    }

    /* ══════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 60px;
      height: 80px;
      transition: all 0.4s ease;
    }
    nav.scrolled {
      background: rgba(10,15,26,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(184,150,90,0.15);
      height: 68px;
    }

    .site-logo-svg {
      transition: filter 0.4s ease;
      filter: drop-shadow(0 0 0px rgba(212,175,114,0));
    }
    .site-logo-svg:hover {
      filter: drop-shadow(0 0 8px rgba(212,175,114,0.4));
    }
    .nav-logo {
      display: flex; flex-direction: column; gap: 2px;
    }
    .nav-logo-top {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem; font-weight: 600;
      color: var(--white); letter-spacing: 0.06em;
    }
    .nav-logo-top span { color: var(--gold2); }
    .nav-logo-bot {
      font-size: 0.6rem; font-weight: 400;
      color: var(--gold); letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .nav-center {
      display: flex; gap: 40px; list-style: none;
    }
    .nav-center a {
      font-size: 0.72rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      text-decoration: none; transition: color 0.25s;
      position: relative;
    }
    .nav-center a::after {
      content: ''; position: absolute;
      bottom: -4px; left: 0; right: 0; height: 1px;
      background: var(--gold2); transform: scaleX(0);
      transition: transform 0.3s; transform-origin: left;
    }
    .nav-center a:hover { color: var(--white); }
    .nav-center a:hover::after { transform: scaleX(1); }

    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-phone {
      font-size: 0.72rem; letter-spacing: 0.12em;
      color: var(--gold2); text-decoration: none;
      font-weight: 500;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid rgba(184,150,90,0.5);
      color: var(--gold2);
      padding: 10px 24px; border-radius: 2px;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      text-decoration: none; cursor: pointer;
      transition: all 0.3s;
    }
    .nav-btn:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--ink);
    }

    /* ══════════════════════════════════════
       HERO — CINEMATIC FULLSCREEN
    ══════════════════════════════════════ */
    .hero {
      position: relative;
      height: 100vh; min-height: 800px;
      display: flex; align-items: flex-end;
      overflow: hidden;
    }

    /* ── CANVAS HERO BACKGROUND ── */
    #heroCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
    .hero-vignette {
      position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse 70% 80% at 30% 50%, transparent 30%, rgba(10,15,26,0.55) 100%),
        linear-gradient(to top, rgba(10,15,26,0.95) 0%, transparent 40%),
        linear-gradient(to right, rgba(10,15,26,0.6) 0%, transparent 60%);
    }

    /* Diagonal gold slash */
    .hero-slash {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%; width: 2px;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(184,150,90,0.6) 30%,
        rgba(212,175,114,0.9) 50%,
        rgba(184,150,90,0.6) 70%,
        transparent 100%);
      z-index: 3;
      transform: skewX(-3deg);
    }

    .hero-content {
      position: relative; z-index: 4;
      width: 100%;
      padding: 160px 80px 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      max-width: 820px;
    }

    .hero-left { max-width: 680px; }
    .hero-eyebrow {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 28px;
    }
    .hero-eyebrow-line {
      width: 40px; height: 1px;
      background: var(--gold2);
    }
    .hero-eyebrow-text {
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold2);
    }

    .hero-h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 6.5vw, 6rem);
      font-weight: 300; line-height: 1.05;
      color: var(--white);
      margin-bottom: 32px;
    }
    .hero-h1 em {
      font-style: italic; color: var(--gold2);
      font-weight: 300;
    }
    .hero-h1 strong {
      font-weight: 600; display: block;
    }

    .hero-sub {
      font-size: 0.88rem; font-weight: 300;
      color: rgba(255,255,255,0.55);
      line-height: 1.9; max-width: 420px;
      margin-bottom: 44px;
      letter-spacing: 0.03em;
    }

    .hero-actions { display: flex; gap: 16px; align-items: center; }
    .btn-gold {
      background: var(--gold);
      color: var(--ink);
      padding: 16px 36px; border-radius: 2px;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      text-decoration: none; border: none; cursor: pointer;
      transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .btn-gold:hover {
      background: var(--gold2);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(184,150,90,0.35);
    }
    .btn-ghost {
      background: transparent;
      color: rgba(255,255,255,0.7);
      padding: 16px 36px; border-radius: 2px;
      font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .btn-ghost:hover {
      border-color: var(--gold2);
      color: var(--gold2);
    }



    /* Scroll indicator */
    .hero-scroll {
      position: absolute;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    .hero-scroll span {
      font-size: 0.58rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
    }
    .scroll-line {
      width: 1px; height: 50px;
      background: linear-gradient(to bottom, rgba(184,150,90,0.8), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.2); }
    }

    /* ══════════════════════════════════════
       MARQUEE TICKER
    ══════════════════════════════════════ */
    .marquee-wrap {
      background: var(--gold);
      padding: 14px 0;
      overflow: hidden;
    }
    .marquee-track {
      display: flex; gap: 0;
      animation: marquee 35s linear infinite;
      white-space: nowrap;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .marquee-item {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 0 40px;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink); flex-shrink: 0;
    }
    .marquee-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(10,15,26,0.35); flex-shrink: 0;
    }

    /* ══════════════════════════════════════
       SECTION COMMONS
    ══════════════════════════════════════ */
    .section { padding: 120px 60px; }
    .section-dark { background: var(--ink); }
    .section-cream { background: var(--cream); color: var(--ink); }
    .section-warm  { background: var(--warm); color: var(--ink); }
    .section-navy  { background: var(--navy); }

    .eyebrow {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }
    .eyebrow-line { width: 32px; height: 1px; background: var(--gold); }
    .eyebrow-text {
      font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold);
    }
    .eyebrow.dark .eyebrow-text { color: var(--gold); }
    .eyebrow.light .eyebrow-line { background: var(--gold); }
    .eyebrow.light .eyebrow-text { color: var(--gold); }

    .display-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 4vw, 3.8rem);
      font-weight: 300; line-height: 1.15;
      margin-bottom: 20px;
    }
    .display-title em { font-style: italic; color: var(--gold2); }
    .display-title.dark { color: var(--ink); }
    .display-title.light { color: var(--white); }

    .body-text {
      font-size: 0.9rem; font-weight: 300;
      line-height: 1.9; letter-spacing: 0.02em;
      max-width: 520px;
    }
    .body-text.dark { color: rgba(10,15,26,0.6); }
    .body-text.light { color: rgba(255,255,255,0.5); }

    .container { max-width: 1280px; margin: 0 auto; }

    /* ══════════════════════════════════════
       SEARCH — EDITORIAL STYLE
    ══════════════════════════════════════ */
    .search-section {
      background: var(--cream);
      padding: 64px 60px;
    }
    .search-inner {
      max-width: 1100px; margin: 0 auto;
    }
    .search-label {
      font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .search-label::before {
      content: ''; width: 24px; height: 1px; background: var(--gold);
    }
    .search-tabs {
      display: flex; gap: 0; margin-bottom: 0;
      border-bottom: 1px solid var(--mist);
    }
    .stab {
      padding: 12px 28px;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(10,15,26,0.4);
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: all 0.25s;
      margin-bottom: -1px;
    }
    .stab.active {
      color: var(--ink);
      border-bottom-color: var(--gold);
    }
    .stab:hover:not(.active) { color: var(--ink); }

    .search-bar {
      display: flex; align-items: center;
      background: var(--white);
      border: 1px solid var(--mist);
      border-top: none;
      padding: 6px 6px 6px 24px;
      gap: 0;
    }
    .search-bar input {
      flex: 1; border: none; outline: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem; font-weight: 300;
      color: var(--ink); background: transparent;
      padding: 14px 0;
    }
    .search-bar input::placeholder { color: rgba(10,15,26,0.35); }
    .search-divider {
      width: 1px; height: 28px;
      background: var(--mist); margin: 0 16px;
    }
    .search-bar select {
      border: none; outline: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.78rem; font-weight: 400;
      color: rgba(10,15,26,0.55);
      background: transparent; cursor: pointer;
      padding: 0 12px;
    }
    .search-go {
      background: var(--ink);
      color: var(--white);
      border: none; cursor: pointer;
      padding: 18px 32px;
      font-family: 'Jost', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.3s;
    }
    .search-go:hover { background: var(--gold); color: var(--ink); }

    /* ══════════════════════════════════════
       MARKETS — IMMERSIVE GRID
    ══════════════════════════════════════ */
    .markets-section {
      background: var(--ink);
      padding: 120px 60px;
    }
    .markets-header {
      display: flex; justify-content: space-between;
      align-items: flex-end; margin-bottom: 64px;
      flex-wrap: wrap; gap: 32px;
    }
    .markets-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-rows: 340px 280px;
      gap: 3px;
    }
    .mcard {
      position: relative; overflow: hidden;
      cursor: pointer;
    }
    .mcard:first-child { grid-row: 1 / 3; }
    .mcard img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.6) saturate(0.85);
      transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94),
                  filter 0.5s;
    }
    .mcard:hover img {
      transform: scale(1.06);
      filter: brightness(0.45) saturate(0.7);
    }
    .mcard-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top,
        rgba(10,15,26,0.9) 0%,
        rgba(10,15,26,0.1) 50%,
        transparent 100%);
    }
    .mcard-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 32px;
    }
    .mcard-tag {
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold2); margin-bottom: 8px;
    }
    .mcard-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem; font-weight: 400;
      color: var(--white); line-height: 1.1;
      margin-bottom: 12px;
    }
    .mcard:first-child .mcard-name { font-size: 2.8rem; }
    .mcard-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold2); text-decoration: none;
      opacity: 0; transform: translateY(8px);
      transition: all 0.3s;
    }
    .mcard:hover .mcard-link { opacity: 1; transform: translateY(0); }
    .mcard-link i { font-size: 0.6rem; }

    /* ══════════════════════════════════════
       SERVICES — DARK EDITORIAL
    ══════════════════════════════════════ */
    .services-section {
      background: var(--navy);
      padding: 120px 60px;
    }
    .services-layout {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 80px;
      align-items: start;
    }
    .services-left { position: sticky; top: 100px; }
    .services-right {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.05);
    }
    .scard {
      background: var(--navy);
      padding: 40px 36px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.35s;
      cursor: pointer;
    }
    .scard:hover {
      background: rgba(184,150,90,0.07);
      border-color: rgba(184,150,90,0.2);
    }
    .scard-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; font-weight: 300;
      color: rgba(184,150,90,0.15);
      line-height: 1; margin-bottom: 20px;
    }
    .scard-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 500;
      color: var(--white); margin-bottom: 12px;
    }
    .scard-desc {
      font-size: 0.82rem; font-weight: 300;
      color: rgba(255,255,255,0.45);
      line-height: 1.8;
    }
    .scard-arrow {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 20px;
      font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold2); text-decoration: none;
      opacity: 0; transition: opacity 0.3s;
    }
    .scard:hover .scard-arrow { opacity: 1; }

    /* ══════════════════════════════════════
       ABOUT — SPLIT LUXURY
    ══════════════════════════════════════ */
    .about-section {
      background: var(--ink);
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 700px;
    }
    .about-img-side {
      position: relative; overflow: hidden;
    }
    .about-img-side img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.75) saturate(0.8);
    }
    .about-img-side::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--ink) 100%);
    }
    /* Gold frame accent */
    .about-img-side::before {
      content: '';
      position: absolute;
      top: 40px; left: 40px; right: 40px; bottom: 40px;
      border: 1px solid rgba(184,150,90,0.25);
      z-index: 2; pointer-events: none;
    }
    .about-content-side {
      padding: 100px 80px 100px 60px;
      display: flex; flex-direction: column;
      justify-content: center;
    }
    .about-content-side .body-text { margin-bottom: 16px; }
    .cred-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px; margin: 36px 0;
    }
    .cred-item {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(184,150,90,0.12);
    }
    .cred-item i { color: var(--gold2); font-size: 0.85rem; }
    .cred-item span {
      font-size: 0.75rem; font-weight: 400;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.04em;
    }
    .lang-row {
      display: flex; gap: 10px; margin-top: 8px;
    }
    .lang-pill {
      padding: 7px 16px;
      background: rgba(184,150,90,0.1);
      border: 1px solid rgba(184,150,90,0.25);
      font-size: 0.7rem; font-weight: 500;
      color: var(--gold2); letter-spacing: 0.1em;
    }
    .about-rating {
      display: flex; align-items: center; gap: 16px;
      margin-top: 36px; padding-top: 36px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .rating-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem; font-weight: 300;
      color: var(--gold2); line-height: 1;
    }
    .rating-detail { display: flex; flex-direction: column; gap: 4px; }
    .rating-stars { color: var(--gold2); font-size: 0.85rem; letter-spacing: 2px; }
    .rating-label {
      font-size: 0.65rem; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* ══════════════════════════════════════
       TESTIMONIALS — MAGAZINE LAYOUT
    ══════════════════════════════════════ */
    .testimonials-section {
      background: var(--cream);
      padding: 120px 60px;
    }
    .testimonials-header {
      text-align: center; margin-bottom: 80px;
    }
    .testimonials-header .eyebrow { justify-content: center; }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    .tcard {
      background: var(--white);
      padding: 48px 40px;
      position: relative;
      transition: transform 0.35s;
    }
    .tcard:hover { transform: translateY(-6px); }
    .tcard-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem; font-weight: 300;
      color: var(--gold2); opacity: 0.25;
      line-height: 0.8;
      margin-bottom: 20px;
    }
    .tcard-stars {
      color: var(--gold); font-size: 0.75rem;
      letter-spacing: 3px; margin-bottom: 20px;
    }
    .tcard-text {
      font-size: 0.88rem; font-weight: 300;
      color: rgba(10,15,26,0.65);
      line-height: 1.85; font-style: italic;
      margin-bottom: 32px;
    }
    .tcard-author {
      display: flex; align-items: center; gap: 14px;
      padding-top: 24px;
      border-top: 1px solid var(--mist);
    }
    .tcard-avatar {
      width: 44px; height: 44px;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 600;
      color: var(--gold2); flex-shrink: 0;
    }
    .tcard-name {
      font-size: 0.82rem; font-weight: 600;
      color: var(--ink); letter-spacing: 0.04em;
    }
    .tcard-loc {
      font-size: 0.7rem; font-weight: 300;
      color: var(--slate); margin-top: 2px;
    }

    /* ══════════════════════════════════════
       INSIGHTS — EDITORIAL CARDS
    ══════════════════════════════════════ */
    .insights-section {
      background: var(--ink);
      padding: 120px 60px;
    }
    .insights-header {
      display: flex; justify-content: space-between;
      align-items: flex-end; margin-bottom: 64px;
      flex-wrap: wrap; gap: 32px;
    }
    .insights-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 3px;
    }
    .icard {
      position: relative; overflow: hidden;
      cursor: pointer;
    }
    .icard-img {
      height: 420px; overflow: hidden;
    }
    .icard:not(:first-child) .icard-img { height: 200px; }
    .icard-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.55);
      transition: transform 0.6s, filter 0.4s;
    }
    .icard:hover .icard-img img {
      transform: scale(1.05);
      filter: brightness(0.4);
    }
    .icard-body {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-top: none;
      padding: 28px 28px 32px;
    }
    .icard-tag {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold2); margin-bottom: 10px;
    }
    .icard-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-weight: 400;
      color: var(--white); line-height: 1.35;
      margin-bottom: 12px;
    }
    .icard:first-child .icard-title { font-size: 1.6rem; }
    .icard-excerpt {
      font-size: 0.8rem; font-weight: 300;
      color: rgba(255,255,255,0.45);
      line-height: 1.75;
    }
    .icard-read {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 20px;
      font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold2); text-decoration: none;
      transition: gap 0.25s;
    }
    .icard-read:hover { gap: 14px; }

    /* ══════════════════════════════════════
       CTA — FULL BLEED LUXURY
    ══════════════════════════════════════ */
    .cta-section {
      position: relative;
      padding: 160px 60px;
      overflow: hidden;
      text-align: center;
    }
    .cta-bg {
      position: absolute; inset: 0;
    }
    .cta-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: brightness(0.25) saturate(0.6);
    }
    .cta-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%,
        rgba(10,15,26,0.4) 0%,
        rgba(10,15,26,0.85) 100%);
    }
    .cta-content {
      position: relative; z-index: 2;
      max-width: 700px; margin: 0 auto;
    }
    .cta-content .eyebrow { justify-content: center; }
    .cta-content .display-title { color: var(--white); margin-bottom: 20px; }
    .cta-content .body-text {
      color: rgba(255,255,255,0.5);
      margin: 0 auto 48px; text-align: center;
    }
    .cta-actions {
      display: flex; gap: 16px;
      justify-content: center; flex-wrap: wrap;
    }
    .cta-trust {
      display: flex; justify-content: center;
      gap: 48px; margin-top: 64px;
      padding-top: 48px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .trust-item { text-align: center; }
    .trust-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 300;
      color: var(--gold2); display: block;
    }
    .trust-label {
      font-size: 0.62rem; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-top: 6px;
    }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    footer {
      background: #050a12;
      padding: 80px 60px 40px;
    }
    .footer-top {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 60px;
      max-width: 1280px; margin: 0 auto 60px;
      padding-bottom: 60px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 400;
      color: var(--white); margin-bottom: 4px;
    }
    .footer-brand-sub {
      font-size: 0.6rem; font-weight: 400;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px;
      display: block;
    }
    .footer-brand-desc {
      font-size: 0.82rem; font-weight: 300;
      color: rgba(255,255,255,0.35);
      line-height: 1.8; margin-bottom: 28px;
    }
    .footer-socials {
      display: flex; gap: 10px;
    }
    .fsoc {
      width: 36px; height: 36px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.4);
      text-decoration: none; font-size: 0.8rem;
      transition: all 0.25s;
    }
    .fsoc:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .footer-col h5 {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }
    .footer-col ul { list-style: none; }
    .footer-col ul li { margin-bottom: 12px; }
    .footer-col ul li a {
      font-size: 0.82rem; font-weight: 300;
      color: rgba(255,255,255,0.35);
      text-decoration: none; transition: color 0.2s;
      letter-spacing: 0.03em;
    }
    .footer-col ul li a:hover { color: var(--gold2); }
    .footer-bottom {
      max-width: 1280px; margin: 0 auto;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .footer-bottom p {
      font-size: 0.72rem; font-weight: 300;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }
    .footer-exp {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.68rem; font-weight: 400;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }
    .footer-exp-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
    }

    /* ══════════════════════════════════════
       FLOATING ACTIONS
    ══════════════════════════════════════ */
    .float-actions {
      position: fixed; bottom: 36px; right: 36px;
      z-index: 998;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 10px;
    }
    .fab {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      text-decoration: none; cursor: pointer;
      transition: all 0.3s;
      border: none;
    }
    .fab-primary {
      background: var(--gold);
      color: var(--ink);
    }
    .fab-primary:hover {
      background: var(--gold2);
      transform: translateX(-4px);
    }
    .fab-secondary {
      background: rgba(10,15,26,0.9);
      color: var(--gold2);
      border: 1px solid rgba(184,150,90,0.3);
      backdrop-filter: blur(10px);
    }
    .fab-secondary:hover {
      border-color: var(--gold2);
      transform: translateX(-4px);
    }

    /* ══════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════ */
    .fade-up {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-up.visible {
      opacity: 1; transform: translateY(0);
    }
    .fade-up-delay-1 { transition-delay: 0.1s; }
    .fade-up-delay-2 { transition-delay: 0.2s; }
    .fade-up-delay-3 { transition-delay: 0.3s; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 1100px) {
      .markets-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
      .mcard:first-child { grid-row: auto; }
      .services-layout { grid-template-columns: 1fr; }
      .services-left { position: static; }
      .about-section { grid-template-columns: 1fr; }
      .about-img-side { height: 400px; }
      .insights-grid { grid-template-columns: 1fr; }
      .icard-img { height: 260px !important; }
      .footer-top { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      .nav-center { display: none; }
      .section, .markets-section,
      .services-section, .testimonials-section,
      .insights-section, .cta-section { padding: 80px 24px; }
      .hero-content { padding: 120px 24px 80px; }
      .markets-grid { grid-template-columns: 1fr; }
      .testimonials-grid { grid-template-columns: 1fr; }
      .services-right { grid-template-columns: 1fr; }
      .footer-top { grid-template-columns: 1fr; }
      .cta-trust { gap: 24px; flex-wrap: wrap; }
      .search-section { padding: 48px 24px; }
    }
  </style>
</head>
